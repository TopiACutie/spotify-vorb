<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uninstall Spotify VORB</title>
<style>
@keyframes fadeIn{from{opacity:0;transform:scale(.97) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes pulseGlow{0%,100%{filter:drop-shadow(0 0 8px rgba(231,76,60,.15))}50%{filter:drop-shadow(0 0 16px rgba(231,76,60,.3))}}
@keyframes ringRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:radial-gradient(ellipse at 50% 30%,rgba(231,76,60,.03),transparent 60%),#0b0b0b;
  min-height:100vh;display:flex;justify-content:center;align-items:center;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  user-select:none;overflow:hidden;padding:20px
}
.window{
  background:rgba(20,20,20,.88);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border:.5px solid rgba(255,255,255,.08);border-top:.5px solid rgba(255,255,255,.12);
  border-radius:20px;padding:36px 40px 28px;max-width:420px;width:100%;
  animation:fadeIn .4s ease-out;box-shadow:0 0 60px rgba(0,0,0,.3)
}
.iconWrap{
  width:64px;height:64px;border-radius:50%;margin:0 auto 18px;position:relative;
  display:flex;align-items:center;justify-content:center
}
.iconWrap::before{
  content:'';position:absolute;inset:-3px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.06);border-top-color:rgba(231,76,60,.3);
  border-right-color:rgba(255,255,255,.1);animation:ringRotate 3s linear infinite
}
.iconImg{width:48px;height:48px;border-radius:50%;animation:pulseGlow 2.5s ease-in-out infinite}
h1{color:#fff;font-size:22px;font-weight:700;text-align:center;margin-bottom:2px}
.sub{text-align:center;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:24px}
.question{color:rgba(255,255,255,.8);font-size:15px;text-align:center;font-weight:500;margin-bottom:20px;line-height:1.5}
.option{
  display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:10px;
  cursor:pointer;transition:background .2s;margin-bottom:6px
}
.option:hover{background:rgba(255,255,255,.04)}
.option input[type="checkbox"]{
  appearance:none;-webkit-appearance:none;width:18px;height:18px;
  border:1.5px solid rgba(255,255,255,.2);border-radius:5px;cursor:pointer;
  flex-shrink:0;position:relative;transition:.2s;margin-top:1px
}
.option input[type="checkbox"]:checked{background:#1DB954;border-color:#1DB954}
.option input[type="checkbox"]:checked::after{
  content:'✓';position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;color:#000;font-size:12px;font-weight:700
}
.option label{font-size:13px;color:rgba(255,255,255,.8);cursor:pointer;line-height:1.4}
.option .desc{font-size:11px;color:rgba(255,255,255,.3);margin-top:2px}
.feedbackWrap{margin:10px 0 16px;padding:0 4px;animation:slideUp .3s ease-out}
.feedbackWrap label{display:block;font-size:11px;color:rgba(255,255,255,.35);margin-bottom:5px;letter-spacing:.3px}
.feedbackWrap textarea{
  width:100%;background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.08);
  border-radius:10px;padding:9px 12px;color:rgba(255,255,255,.65);font-size:12px;
  font-family:inherit;resize:vertical;min-height:50px;max-height:100px;outline:none;transition:.2s
}
.feedbackWrap textarea:focus{border-color:rgba(231,76,60,.3);background:rgba(255,255,255,.06)}
.feedbackWrap textarea::placeholder{color:rgba(255,255,255,.15)}
.btnRow{display:flex;gap:10px;margin-top:6px}
.btn{
  flex:1;padding:10px 18px;border:none;border-radius:10px;font-size:13px;font-weight:600;
  cursor:pointer;transition:.15s;letter-spacing:.2px
}
.btn-primary{background:#1DB954;color:#000}
.btn-primary:hover{background:#1ed760;transform:translateY(-1px);box-shadow:0 4px 12px rgba(29,185,84,.25)}
.btn-secondary{background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);border:.5px solid rgba(255,255,255,.08)}
.btn-secondary:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-danger{background:rgba(231,76,60,.12);color:#e74c3c;border:.5px solid rgba(231,76,60,.2)}
.btn-danger:hover{background:rgba(231,76,60,.22);transform:translateY(-1px);box-shadow:0 4px 12px rgba(231,76,60,.15)}
.btn-danger:active{transform:translateY(0)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.statusMsg{text-align:center;font-size:12px;margin-top:14px;min-height:18px;animation:slideUp .3s ease-out}
.statusMsg.success{color:#1DB954}
.statusMsg.error{color:#e74c3c}
.statusMsg.info{color:rgba(255,255,255,.45)}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.15);border-top-color:rgba(255,255,255,.6);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.footer{margin-top:20px;padding-top:14px;border-top:.5px solid rgba(255,255,255,.05);text-align:center}
.footer p{font-size:10px;color:rgba(255,255,255,.18);letter-spacing:.5px}
</style>
</head>
<body>
<div class="window" id="window">
  <div class="iconWrap">
    <img class="iconImg" id="iconImg" />
  </div>
  <h1>Uninstall Spotify VORB</h1>
  <div class="sub">Visualized Oscillation Radio Ball</div>
  <div class="question">Are you sure you want to uninstall?</div>

  <div class="option" onclick="toggleKeep()">
    <input type="checkbox" id="keepSettings" checked />
    <div>
      <label>Keep my settings</label>
      <div class="desc">Preserves config.json, auth tokens, and logs in %APPDATA% for future reinstalls</div>
    </div>
  </div>

  <div class="option" onclick="toggleClearCache()">
    <input type="checkbox" id="clearCache" />
    <div>
      <label>Clear cached data</label>
      <div class="desc">Removes temporary files and cached album art</div>
    </div>
  </div>

  <div class="feedbackWrap" id="feedbackWrap">
    <label for="feedbackText">What could we do better? (optional)</label>
    <textarea id="feedbackText" placeholder="Your feedback helps us improve..."></textarea>
  </div>

  <div class="btnRow">
    <button class="btn btn-secondary" onclick="cancel()">Cancel</button>
    <button class="btn btn-danger" id="uninstallBtn" onclick="confirmUninstall()">Uninstall</button>
  </div>

  <div class="statusMsg" id="statusMsg"></div>

  <div class="footer">
    <p>We hate to see you go</p>
  </div>
</div>

<script>
let uninstalling=false;
document.getElementById("iconImg").src="../assets/icon.ico?v="+Date.now();
function toggleKeep(){const c=document.getElementById("keepSettings");c.checked=!c.checked}
function toggleClearCache(){const c=document.getElementById("clearCache");c.checked=!c.checked}
async function confirmUninstall(){
  if(uninstalling)return;
  uninstalling=true;
  const btn=document.getElementById("uninstallBtn");
  const msg=document.getElementById("statusMsg");
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Uninstalling...';
  msg.className="statusMsg info";
  msg.textContent="Preparing to uninstall...";
  try{
    const keepSettings=document.getElementById("keepSettings").checked;
    const clearCache=document.getElementById("clearCache").checked;
    const feedback=document.getElementById("feedbackText").value.trim();
    msg.textContent="Removing application...";
    const result=await window.electronAPI.uninstallVorb({keepSettings,clearCache,feedback});
    if(result.success){
      msg.className="statusMsg success";
      msg.textContent="VORB has been uninstalled successfully.";
      btn.textContent="Done";
      btn.onclick=()=>window.close();
      btn.disabled=false;
      btn.className="btn btn-primary";
    }else{
      msg.className="statusMsg error";
      msg.textContent=result.message||"Uninstall failed.";
      btn.disabled=false;
      btn.textContent="Uninstall";
      uninstalling=false;
    }
  }catch(err){
    msg.className="statusMsg error";
    msg.textContent="Error: "+(err.message||"Unknown");
    btn.disabled=false;
    btn.textContent="Uninstall";
    uninstalling=false;
  }
}
function cancel(){window.close()}
window.addEventListener("keydown",e=>{if(e.key==="Escape")cancel();if(e.key==="Enter"&&!uninstalling)confirmUninstall()});
</script>
</body>
</html>
