<!DOCTYPE html>
<html lang="en" style="background:#0b0b0b">
<head>
<meta charset="UTF-8">
<style>
@keyframes fadeScale{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes glowPulse{0%,100%{filter:drop-shadow(0 0 10px rgba(255,255,255,.35)) drop-shadow(0 0 25px rgba(29,185,84,.15))}50%{filter:drop-shadow(0 0 20px rgba(255,255,255,.55)) drop-shadow(0 0 50px rgba(29,185,84,.3))}}
@keyframes ringRotate{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes ringRotateR{from{transform:rotate(360deg)}to{transform:rotate(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes dotPulse{0%,100%{opacity:.25;transform:scale(1)}50%{opacity:.8;transform:scale(1.2)}}
@keyframes orbBreath{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0b0b}
body{display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;user-select:none;background:radial-gradient(ellipse at 50% 40%,rgba(29,185,84,.08) 0%,transparent 55%),radial-gradient(ellipse at 70% 70%,rgba(255,255,255,.03) 0%,transparent 45%),radial-gradient(ellipse at 25% 80%,rgba(29,185,84,.04) 0%,transparent 40%),#0b0b0b}
.splash{text-align:center;animation:fadeScale .7s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column;align-items:center;width:340px}
.orbContainer{position:relative;width:150px;height:150px;margin-bottom:28px;animation:orbBreath 3s ease-in-out infinite}
.orbRing{position:absolute;inset:0;border-radius:50%}
.orbRing::before{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.5px solid rgba(255,255,255,.06);border-top-color:rgba(29,185,84,.5);border-right-color:rgba(255,255,255,.12);animation:ringRotate 2.5s linear infinite;will-change:transform;box-shadow:0 0 15px rgba(29,185,84,.15)}
.orbRing::after{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(255,255,255,.03);border-bottom-color:rgba(29,185,84,.25);border-left-color:rgba(255,255,255,.06);animation:ringRotateR 3.5s linear infinite;will-change:transform}
#splashLogo{width:120px;height:120px;border-radius:50%;object-fit:cover;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:glowPulse 2.5s ease-in-out infinite;box-shadow:0 0 35px rgba(29,185,84,.12),0 0 70px rgba(0,0,0,.3);will-change:filter}
.title{background:linear-gradient(90deg,rgba(255,255,255,.2),rgba(255,255,255,.8),rgba(255,255,255,.2));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.5s linear infinite;font-size:42px;font-weight:700;letter-spacing:10px;margin-bottom:12px}
.sub{background:linear-gradient(90deg,rgba(255,255,255,.18),rgba(255,255,255,.55),rgba(255,255,255,.18));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.5s linear infinite;font-size:11px;letter-spacing:3.5px;text-transform:uppercase;font-weight:400;line-height:1.6;text-align:center}
.dotRow{margin-top:24px;display:flex;justify-content:center;gap:8px}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);animation:dotPulse 1.8s ease-in-out infinite;will-change:transform,opacity}
.dot:nth-child(2){animation-delay:.3s}
.dot:nth-child(3){animation-delay:.6s}
.version{color:rgba(255,255,255,.1);font-size:10px;letter-spacing:2.5px;margin-top:28px;font-weight:400}
</style>
</head>
<body style="background:#0b0b0b">
<div class="splash">
<div class="orbContainer"><div class="orbRing"></div><img id="splashLogo"/></div>
<div class="title">V.O.R.B</div>
<div class="sub">Visualized Oscillation<br>Radio Ball</div>
<div class="dotRow"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
<div class="version" id="versionLabel">v... &middot; Spotify</div>
</div>
</body>
</html>
